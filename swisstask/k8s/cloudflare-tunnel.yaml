apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-tunnel
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
        - tunnel
        - --no-autoupdate
        - run
        env:
        - name: TUNNEL_TOKEN
          value: "eyJhIjoiZjllYjQ2MWE4NjBmOWE5MmYzYmU5NDQ5NTBhNTIzNmIiLCJ0IjoiM2FjMTUxM2EtMjQ0Yi00NjU0LWIwOTAtOTJjNTIzYzkyZDBiIiwicyI6Ik56aG1aRGd6TlRVdFl6TXdOaTAwTVRaaExUaGxNamd0TlRJellUWmhOakUzTnpVNCJ9"